name: Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Check version tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Resolve tag
      id: resolve
      run: |
        # If triggered by a tag push, use that tag directly
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Triggered by tag push: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Otherwise read version from Cargo.toml
        VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
        TAG="v${VERSION}"
        echo "Current version: ${VERSION}, tag: ${TAG}"

        # Skip if tag already exists
        if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
          echo "Tag ${TAG} already exists, skipping release."
          echo "tag=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Create and push tag
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${TAG}" -m "Release ${TAG}"
        git push origin "${TAG}"
        echo "Created tag ${TAG}"
        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (Windows)
    needs: check-version
    if: needs.check-version.outputs.tag != ''
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build release binaries
      run: cargo build --release -p setupweaver-packager -p setupweaver-packager-gui -p setupweaver-runtime -p setupweaver-runtime-admin

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-windows
        path: |
          target/release/setupweaver-packager.exe
          target/release/setupweaver-packager-gui.exe
          target/release/setupweaver-runtime.exe
          target/release/setupweaver-runtime-admin.exe

  publish:
    name: Publish release
    needs: [check-version, build]
    if: needs.check-version.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: binaries-windows
        path: dist/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.check-version.outputs.tag }}
        generate_release_notes: true
        files: |
          dist/setupweaver-packager.exe
          dist/setupweaver-packager-gui.exe
          dist/setupweaver-runtime.exe
          dist/setupweaver-runtime-admin.exe
