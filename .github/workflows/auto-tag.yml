name: Auto-tag release

on:
  push:
    branches: [ "main" ]
    paths:
      - "Cargo.toml"

permissions:
  contents: write

jobs:
  tag:
    name: Create tag from version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Check version change and create tag
      run: |
        VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
        TAG="v${VERSION}"
        echo "Current version: ${VERSION}"
        echo "Tag: ${TAG}"

        # Check if this tag already exists
        if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
          echo "Tag ${TAG} already exists, skipping."
          exit 0
        fi

        # Check if the version line actually changed in this push
        OLD_VERSION=$(git show HEAD~1:Cargo.toml 2>/dev/null | grep -m1 '^version' | sed 's/.*"\(.*\)".*/\1/' || echo "")
        if [ "${VERSION}" = "${OLD_VERSION}" ]; then
          echo "Version unchanged (${VERSION}), skipping."
          exit 0
        fi

        echo "Version changed: ${OLD_VERSION} -> ${VERSION}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${TAG}" -m "Release ${TAG}"
        git push origin "${TAG}"
        echo "Created and pushed tag ${TAG}"
